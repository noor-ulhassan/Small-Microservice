version: '3.8'

services:
  next-frontend:
    # Use Node 20 for the Next.js frontend
    image: node:22-alpine
    working_dir: /app
    # Mount the local directory so we can edit Next.js code live
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: npm run dev
    environment:
      # The DNS alias we defined where Next.js will look for the Python service
      - INTERNAL_API_URL=http://python-backend:8000
    depends_on:
      - python-backend
    networks:
      - word-scale-net

  python-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Exposing the port to localhost so you can run 'npm run dev' on your Windows machine
    # while only running Python inside Docker.
    ports:
      - "8000:8000"
    networks:
      - word-scale-net

networks:
  word-scale-net:
    driver: bridge
